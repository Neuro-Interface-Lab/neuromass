name: Step - resolve bump label

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to inspect
        required: true
        type: number
    outputs:
      bump_type:
        description: Resolved semantic version bump type
        value: ${{ jobs.resolve-bump.outputs.bump_type }}

permissions:
  contents: read
  pull-requests: read

jobs:
  resolve-bump:
    runs-on: ubuntu-latest
    outputs:
      bump_type: ${{ steps.resolve.outputs.bump_type }}

    steps:
      - name: Resolve bump label
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ inputs.pr_number }}");
            const allowed = ["bump:major", "bump:minor", "bump:patch"];

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const labels = pr.labels.map((label) => label.name);
            const matches = labels.filter((label) => allowed.includes(label));

            if (matches.length !== 1) {
              core.setFailed(
                `Exactly one release label is required on the pull request: ${allowed.join(", ")}. Found: ${matches.join(", ") || "none"}.`
              );
              return;
            }

            const bumpType = matches[0].split(":")[1];
            core.info(`Resolved bump type: ${bumpType}`);
            core.setOutput("bump_type", bumpType);

