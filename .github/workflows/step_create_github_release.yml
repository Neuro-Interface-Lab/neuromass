name: Step - create GitHub release

on:
  workflow_call:
    inputs:
      tag_name:
        description: Git tag to release
        required: true
        type: string
      release_name:
        description: Human-readable release title
        required: true
        type: string
      target_commitish:
        description: Branch or commit associated with the release
        required: false
        default: main
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ inputs.tag_name }}" >/dev/null 2>&1; then
            echo "Release for tag ${{ inputs.tag_name }} already exists."
            exit 0
          fi

          gh release create "${{ inputs.tag_name }}" \
            --title "${{ inputs.release_name }}" \
            --target "${{ inputs.target_commitish }}" \
            --generate-notes

