name: Step - lint python

on:
  workflow_call:
    inputs:
      python_version:
        description: Python version used for linting
        required: false
        default: "3.12"
        type: string

jobs:
  lint-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install project and lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Ruff
        run: ruff check .

