name: Coordination - dev

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    if: github.event_name == 'push' || !github.event.pull_request.draft
    uses: ./.github/workflows/step_lint_python.yml

  tests:
    if: github.event_name == 'push' || !github.event.pull_request.draft
    uses: ./.github/workflows/step_pytest.yml

