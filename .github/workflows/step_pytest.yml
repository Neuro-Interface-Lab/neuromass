name: Step - pytest

on:
  workflow_call:
    inputs:
      python_version:
        description: Python version used for tests
        required: false
        default: "3.12"
        type: string

jobs:
  pytest:
    runs-on: ubuntu-latest

    env:
      MPLBACKEND: Agg
      MPLCONFIGDIR: /tmp/matplotlib

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run pytest
        run: pytest tests -q

